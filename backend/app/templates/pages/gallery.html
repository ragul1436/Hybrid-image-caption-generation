{% extends "layout.html" %}
{% block title %}Gallery{% endblock %}

{% block content %}
<div>
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-white">My Gallery</h2>
        <a href="/upload" class="text-indigo-400 hover:text-indigo-300 text-sm font-semibold">+ Upload New</a>
    </div>

    <div id="gallery-loading" class="text-center text-slate-400">Loading...</div>

    <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 hidden"></div>

    <div id="gallery-empty" class="hidden text-center py-20 bg-slate-800/50 rounded-lg border border-dashed border-slate-700">
        <svg class="h-12 w-12 text-slate-600 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0 0 22.5 18.75V5.25A2.25 2.25 0 0 0 20.25 3H3.75A2.25 2.25 0 0 0 1.5 5.25v13.5A2.25 2.25 0 0 0 3.75 21Z"/></svg>
        <h3 class="text-lg font-medium text-slate-300">No images yet</h3>
        <p class="text-slate-500 mt-2">Start by <a href="/upload" class="text-indigo-400 hover:underline">uploading some images</a>.</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    requireAuth();

    const loading = document.getElementById('gallery-loading');
    const grid = document.getElementById('gallery-grid');
    const empty = document.getElementById('gallery-empty');

    try {
        const res = await apiFetch('/api/v1/images/');
        const images = await res.json();

        loading.style.display = 'none';

        if (images.length === 0) {
            empty.classList.remove('hidden');
            return;
        }

        grid.classList.remove('hidden');

        images.forEach(img => {
            const card = document.createElement('a');
            card.href = `/image/${img.id}`;
            card.className = 'group relative block bg-slate-800 rounded-lg overflow-hidden border border-slate-700 hover:border-indigo-500/50 transition-colors';
            card.innerHTML = `
                <div class="aspect-[4/3] w-full overflow-hidden bg-slate-900">
                    <img src="${img.original_url}" alt="${img.filename}"
                        class="h-full w-full object-cover object-center group-hover:opacity-75"
                        onerror="this.onerror=null;this.style.display='none';">
                </div>
                <div class="p-4">
                    <p class="text-sm font-medium text-white truncate">${img.filename}</p>
                    <p class="mt-1 text-xs text-gray-500">${new Date(img.uploaded_at).toLocaleDateString()}</p>
                </div>
            `;
            grid.appendChild(card);
        });
    } catch (err) {
        loading.textContent = 'Failed to load gallery';
        console.error(err);
    }
});
</script>
{% endblock %}
