{% extends "layout.html" %}
{% block title %}Admin Panel{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto py-6 px-4">
    <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2">
        <svg class="h-8 w-8 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/></svg>
        Admin Panel
    </h2>

    <!-- Tabs -->
    <div class="border-b border-slate-700 mb-6">
        <nav class="-mb-px flex space-x-8">
            <button onclick="switchTab('users')" id="tab-users"
                class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm flex items-center gap-2 border-indigo-500 text-indigo-400">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z"/></svg>
                Users
            </button>
            <button onclick="switchTab('models')" id="tab-models"
                class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm flex items-center gap-2 border-transparent text-slate-400 hover:text-slate-200">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 3v1.5M4.5 8.25H3m18 0h-1.5M4.5 12H3m18 0h-1.5m-15 3.75H3m18 0h-1.5M8.25 19.5V21M12 3v1.5m0 15V21m3.75-18v1.5m0 15V21m-9-1.5h10.5a2.25 2.25 0 0 0 2.25-2.25V6.75a2.25 2.25 0 0 0-2.25-2.25H6.75A2.25 2.25 0 0 0 4.5 6.75v10.5a2.25 2.25 0 0 0 2.25 2.25Zm.75-12h9v9h-9v-9Z"/></svg>
                ML Models
            </button>
        </nav>
    </div>

    <div id="admin-loading" class="text-center text-slate-400">Loading...</div>

    <!-- Users Tab -->
    <div id="panel-users" class="hidden bg-slate-800 rounded-lg border border-slate-700 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-slate-700">
                <thead class="bg-slate-900">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Email</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Role</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-400 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 relative"><span class="sr-only">Actions</span></th>
                    </tr>
                </thead>
                <tbody id="users-tbody" class="bg-slate-800 divide-y divide-slate-700"></tbody>
            </table>
        </div>
    </div>

    <!-- Models Tab -->
    <div id="panel-models" class="hidden bg-slate-800 rounded-lg border border-slate-700 overflow-hidden">
        <div class="p-6">
            <ul id="models-list" class="divide-y divide-slate-700"></ul>
            <div class="mt-4 pt-4 border-t border-slate-700">
                <button class="text-sm text-indigo-400 hover:underline">+ Upload New Model</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
let currentTab = 'users';

document.addEventListener('DOMContentLoaded', async () => {
    requireAuth();
    await fetchAdminData();
});

async function fetchAdminData() {
    const loading = document.getElementById('admin-loading');

    try {
        const usersRes = await apiFetch('/api/v1/admin/users');
        const users = await usersRes.json();

        // Render users table
        const tbody = document.getElementById('users-tbody');
        users.forEach(user => {
            const tr = document.createElement('tr');
            const roleClass = user.role === 'admin' ? 'bg-purple-100 text-purple-800' : 'bg-green-100 text-green-800';
            tr.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-white">${user.name}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-400">${user.email}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-300">
                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${roleClass}">${user.role}</span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-300">${user.is_active ? 'Active' : 'Inactive'}</td>
                <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                    <button class="text-indigo-400 hover:text-indigo-300">Edit</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        // Mock models
        const models = [
            { id: 1, name: 'BLIP Base', version: '1.0', active: true },
            { id: 2, name: 'ResNet50 + Transformer', version: '0.9-beta', active: false }
        ];

        const modelsList = document.getElementById('models-list');
        models.forEach(model => {
            const li = document.createElement('li');
            li.className = 'py-4 flex items-center justify-between';
            const statusClass = model.active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800';
            li.innerHTML = `
                <div>
                    <p class="text-sm font-medium text-white">${model.name}</p>
                    <p class="text-sm text-slate-400">Version: ${model.version}</p>
                </div>
                <div class="flex items-center gap-4">
                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${statusClass}">${model.active ? 'Active' : 'Inactive'}</span>
                    <button class="text-slate-400 hover:text-white">Configure</button>
                </div>
            `;
            modelsList.appendChild(li);
        });

        loading.style.display = 'none';
        switchTab('users');
    } catch (err) {
        loading.textContent = 'Failed to load admin data. You may not have admin privileges.';
        console.error(err);
    }
}

function switchTab(tab) {
    currentTab = tab;

    // Update tab buttons
    document.getElementById('tab-users').className = tab === 'users'
        ? 'whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm flex items-center gap-2 border-indigo-500 text-indigo-400'
        : 'whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm flex items-center gap-2 border-transparent text-slate-400 hover:text-slate-200';

    document.getElementById('tab-models').className = tab === 'models'
        ? 'whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm flex items-center gap-2 border-indigo-500 text-indigo-400'
        : 'whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm flex items-center gap-2 border-transparent text-slate-400 hover:text-slate-200';

    // Show/hide panels
    document.getElementById('panel-users').classList.toggle('hidden', tab !== 'users');
    document.getElementById('panel-models').classList.toggle('hidden', tab !== 'models');
}
</script>
{% endblock %}
