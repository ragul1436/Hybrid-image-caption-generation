{% extends "layout.html" %}
{% block title %}Album Detail{% endblock %}

{% block content %}
<div>
    <a href="/albums" class="flex items-center text-slate-400 hover:text-white mb-6 transition-colors">
        <svg class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
        Back to Albums
    </a>

    <div id="album-loading" class="text-white text-center mt-20">Loading...</div>

    <div id="album-content" class="hidden">
        <div class="mb-8 border-b border-slate-700 pb-6">
            <h1 class="text-3xl font-bold text-white mb-2" id="album-name"></h1>
            <p class="text-slate-400" id="album-desc"></p>
            <p class="text-slate-500 text-sm mt-2" id="album-date"></p>
        </div>

        <div id="album-images" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

        <div id="album-empty" class="hidden text-center py-20 bg-slate-800/50 rounded-lg border border-dashed border-slate-700">
            <svg class="h-12 w-12 text-slate-600 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0 0 22.5 18.75V5.25A2.25 2.25 0 0 0 20.25 3H3.75A2.25 2.25 0 0 0 1.5 5.25v13.5A2.25 2.25 0 0 0 3.75 21Z"/></svg>
            <h3 class="text-lg font-medium text-slate-300">No images in this album</h3>
            <p class="text-slate-500">Add images from the main gallery.</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    requireAuth();

    const pathParts = window.location.pathname.split('/');
    const albumId = pathParts[pathParts.length - 1];

    const loading = document.getElementById('album-loading');
    const content = document.getElementById('album-content');

    try {
        const res = await apiFetch(`/api/v1/albums/${albumId}`);
        if (!res.ok) throw new Error('Not found');

        const album = await res.json();

        document.getElementById('album-name').textContent = album.name;
        document.getElementById('album-desc').textContent = album.description || '';
        document.getElementById('album-date').textContent = 'Created on ' + new Date(album.created_at).toLocaleDateString();

        loading.style.display = 'none';
        content.classList.remove('hidden');

        if (album.images && album.images.length > 0) {
            const grid = document.getElementById('album-images');
            album.images.forEach(img => {
                const card = document.createElement('a');
                card.href = `/image/${img.id}`;
                card.className = 'group relative block bg-slate-800 rounded-lg overflow-hidden border border-slate-700 hover:border-indigo-500/50 transition-colors';
                card.innerHTML = `
                    <div class="aspect-[4/3] w-full overflow-hidden bg-slate-900">
                        <img src="${img.original_url}" alt="${img.filename}"
                            class="h-full w-full object-cover object-center group-hover:opacity-75">
                    </div>
                    <div class="p-3">
                        <p class="text-sm font-medium text-white truncate">${img.filename}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        } else {
            document.getElementById('album-empty').classList.remove('hidden');
        }
    } catch (err) {
        showToast('Album not found', 'error');
        window.location.href = '/albums';
    }
});
</script>
{% endblock %}
